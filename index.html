<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Quirófano Tech</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="slide">

  <header>
    <h1>Quirófano Tech</h1>
    <p>Aprende y arma la PC correctamente</p>
  </header>

  <!-- SECCIÓN INFORMACIÓN -->
  <section class="panel">

    <h2>Explorar Componentes</h2>

    <div class="grid">
      <div class="card" onclick="mostrarInfo('placa')">Placa Madre</div>
      <div class="card" onclick="mostrarInfo('cpu')">CPU</div>
      <div class="card" onclick="mostrarInfo('ram')">RAM</div>
      <div class="card" onclick="mostrarInfo('disco')">Disco / SSD</div>
      <div class="card" onclick="mostrarInfo('fuente')">Fuente</div>
    </div>

  </section>

  <!-- SECCIÓN JUEGO -->
  <section class="panel">

    <h2>Ensamblaje Correcto</h2>
    <p id="estado">Paso actual: 1</p>

    <div class="progreso-contenedor">
      <div id="barraProgreso" class="barra-progreso"></div>
    </div>

    <div class="grid">
      <div class="card" onclick="ensamblar(event,'placa')">Placa</div>
      <div class="card" onclick="ensamblar(event,'cpu')">CPU</div>
      <div class="card" onclick="ensamblar(event,'ram')">RAM</div>
      <div class="card" onclick="ensamblar(event,'disco')">Disco</div>
      <div class="card" onclick="ensamblar(event,'fuente')">Fuente</div>
    </div>

  </section>

  <!-- FORMULARIO FINAL -->
  <section class="panel">

    <h2>Verificación Final</h2>

    <form id="formulario">
      <input type="text" placeholder="Tu nombre" required>

      <label class="check">
        <input type="checkbox" required>
        Confirmo que conozco el orden correcto
      </label>

      <button type="submit">Finalizar</button>
    </form>

    <p id="mensajeFinal"></p>

  </section>

</div>

<!-- MODAL -->
<div id="modal" class="modal oculto">
  <div class="modal-contenido">
    <span class="cerrar" onclick="cerrarModal()">✖</span>
    <h3 id="titulo"></h3>
    <img id="imagen">
    <p id="descripcion"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
